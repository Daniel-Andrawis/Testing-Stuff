{% extends "base.html" %}
{% block title %}Sign Up — CyberRank{% endblock %}

{% block content %}
<div class="auth-container">
    <h1>Create your account</h1>
    <p class="text-dim" style="font-size:0.88rem;">Start matching against cybersecurity jobs.</p>

    <form id="register-form" class="card">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-input" placeholder="Min 8 characters" minlength="8" required>
        </div>
        <div class="form-group">
            <label for="password_confirm">Confirm</label>
            <input type="password" id="password_confirm" class="form-input" placeholder="Repeat password" minlength="8" required>
        </div>
        <div id="register-error" style="display:none; color:var(--red); font-size:0.82rem; margin-bottom:0.75rem; font-family:var(--font-mono);"></div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Create Account</button>
    </form>

    <p class="text-dim mt-2" style="text-align:center; font-size:0.82rem;">
        Have an account? <a href="/login" class="text-cyan" style="text-decoration:none;">Log in</a>
    </p>
</div>

<script>
document.getElementById('register-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const errEl = document.getElementById('register-error');
    errEl.style.display = 'none';
    const pw = document.getElementById('password').value;
    if (pw !== document.getElementById('password_confirm').value) {
        errEl.textContent = 'Passwords do not match.';
        errEl.style.display = 'block';
        return;
    }
    const resp = await fetch('/auth/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ email: document.getElementById('email').value, password: pw }),
    });
    if (resp.ok) {
        const fd = new FormData();
        fd.append('username', document.getElementById('email').value);
        fd.append('password', pw);
        const lr = await fetch('/auth/login', { method: 'POST', body: fd });
        window.location.href = lr.ok ? '/profile/setup' : '/login';
    } else {
        const data = await resp.json();
        errEl.textContent = data.detail || 'Registration failed.';
        errEl.style.display = 'block';
    }
});
</script>
{% endblock %}
